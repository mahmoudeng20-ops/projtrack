name: second_one
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+9

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # حزم اللغات والـ Localizations
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # حزم النظام والخدمات
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  pdf: ^3.10.0
  excel: ^4.0.0

  # حزم الفايربيز الحديثة المتوافقة تماماً مع الـ Swift Package Manager (SPM)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  in_app_update: ^4.2.5
  upgrader: ^13.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # الحزمة المسؤولة عن توليد أيقونات التطبيق للهواتف
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"