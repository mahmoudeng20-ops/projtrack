name: second_one
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # حزم اللغات والـ Localizations (تم التعديل للإصدار المتوافق تماماً مع الـ SDK لديك)
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # حزم النظام والخدمات
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8

  # حزم الفايربيز المستقرة (تم تثبيت الإصدارات لمنع تعارض الأكواد في iOS)
  firebase_core: 3.1.1
  firebase_auth: 5.1.1
  cloud_firestore: 5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # الحزمة المسؤولة عن توليد أيقونات التطبيق للهواتف
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # تفعيل مجلد الـ assets العام للصور داخل التطبيق
  assets:
    - assets/

# إعدادات أيقونة التطبيق الرسمية للشاشة الخارجية
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"